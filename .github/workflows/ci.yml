name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # needed for auto-commit on same-repo refs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.13-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.13-

      - name: Run pre-commit
        id: precommit
        run: pre-commit run --all-files --show-diff-on-failure --color always
        continue-on-error: true

      - name: Auto-commit pre-commit fixes
        id: autocommit
        if: >-
          steps.precommit.outcome == 'failure' &&
          (github.event_name == 'push' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: apply pre-commit fixes [skip ci]"

      - name: Fail if pre-commit reported unfixable issues
        if: >-
          steps.precommit.outcome == 'failure' &&
          steps.autocommit.outputs.changes_detected != 'true'
        run: |
          echo "::error::pre-commit failed and no fixes could be auto-applied. Run 'pre-commit run --all-files' locally."
          exit 1
